services:
  postgres:
    restart: unless-stopped
    image: pgvector/pgvector:pg16
    command: postgres -c max_connections=100 -c shared_buffers=128MB -c log_min_duration_statement=1000
    environment:
      POSTGRES_DB: ai_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "ai_os"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  pgvector:
    restart: unless-stopped
    image: qdrant/qdrant:latest
    volumes:
      - pgvector_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  fastapi:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/home/appuser/app/app
      - ./tests:/home/appuser/app/tests
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ai_os
      - REDIS_URL=redis://redis:6379/0
      - PGVECTOR_HOST=pgvector
      - PGVECTOR_PORT=6333
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgvector:
        condition: service_started

  celery:
    command: celery -A app.workers.celery_app worker --loglevel=debug -Q default,embeddings,documents,cleanup
    volumes:
      - ./app:/home/appuser/app/app
      - ./tests:/home/appuser/app/tests
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ai_os
      - REDIS_URL=redis://redis:6379/0
      - PGVECTOR_HOST=pgvector
      - PGVECTOR_PORT=6333
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

volumes:
  postgres_data:
  redis_data:
  pgvector_data:
