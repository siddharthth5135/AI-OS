  # pgvector:
  #   <<: *restart
  #   image: # REMOVED - Supabase pgvector used instead
  #   volumes: [pgvector_data:/pgvector/storage]
  #   ports: ["6333:6333","6334:6334"]
  #   environment:
  #     PGVECTOR__SERVICE__GRPC_PORT: 6334
  #   logging: *default-logging

  fastapi:
    <<: *restart
    build: {context: ., dockerfile: Dockerfile}
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - storage_data:/home/appuser/app/storage
    logging: *default-logging
    deploy:
      resources:
        limits: {memory: 512M}

  celery:
    <<: *restart
    build: {context: ., dockerfile: Dockerfile}
    command: celery -A app.workers.celery_app worker --loglevel=info -Q default,embeddings,documents,cleanup --concurrency=2
    env_file: .env
    volumes:
      - storage_data:/home/appuser/app/storage
    logging: *default-logging
    deploy:
      resources:
        limits: {memory: 512M}

  nginx:
    <<: *restart
    image: nginx:1.25-alpine
    ports: ["80:80"]
    volumes: [./nginx/nginx.conf:/etc/nginx/nginx.conf:ro]
    depends_on: [fastapi]
    logging: *default-logging

volumes:
  # postgres_data:
  # redis_data:
  # pgvector_data:
  storage_data:
